name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  update-major-tag:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Move major version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "v${{ needs.release-please.outputs.major }}" "${{ needs.release-please.outputs.tag_name }}"
          git push origin "v${{ needs.release-please.outputs.major }}" --force

# Note: publishing a GitHub Action release to GitHub Marketplace is still a manual UI step.
# GitHub documents this as the release-form checkbox "Publish this Action to the GitHub Marketplace".
# We found no supported REST, GraphQL, or release-please option to automate it.
